<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petscan – Login Test</title>
<style>
body{font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#0f1c35;}
.card{background:#fff;border-radius:12px;padding:32px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
h2{margin:0 0 20px;font-size:20px;}
input{width:100%;padding:10px 12px;margin-bottom:14px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;box-sizing:border-box;}
button{width:100%;padding:11px;background:#1a56db;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;}
button:hover{background:#1447b7;}
.err{color:#dc2626;font-size:13px;margin-bottom:10px;display:none;}
.ok{color:#059669;font-size:13px;margin-bottom:10px;display:none;}
</style>
</head>
<body>
<div class="card">
  <h2>🐾 Petscan Login</h2>
  <div id="err" class="err"></div>
  <div id="ok" class="ok"></div>
  <input type="email" id="em" placeholder="E-Mail" value="dr.mueller@tierklinik.de">
  <input type="password" id="pw" placeholder="Passwort" value="demo123">
  <button onclick="login()">Anmelden</button>
  <p style="font-size:11px;color:#999;margin-top:12px;text-align:center">Demo: dr.mueller@tierklinik.de / demo123</p>
</div>
<script>
async function login() {
  const em = document.getElementById('em').value.trim();
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  const ok  = document.getElementById('ok');
  err.style.display = 'none';
  ok.style.display  = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: em, password: pw})
    });
    const data = await res.json();
    if (!res.ok) {
      err.textContent = data.error || 'Fehler';
      err.style.display = 'block';
      return;
    }
    localStorage.setItem('ps_token', data.token);
    ok.textContent = 'Login erfolgreich! Weiterleitung...';
    ok.style.display = 'block';
    setTimeout(() => window.location.reload(), 1000);
  } catch(e) {
    err.textContent = 'Verbindungsfehler: ' + e.message;
    err.style.display = 'block';
  }
}
document.addEventListener('keydown', e => { if(e.key==='Enter') login(); });
</script>
</body>
</html>
