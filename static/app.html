<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petscan – KI-Plattform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f1c35;--navy2:#1a2e52;--blue:#1a56db;--blue2:#1447b7;
  --blue-dim:#eff6ff;--blue-mid:#bfdbfe;
  --green:#059669;--green-dim:#ecfdf5;
  --amber:#b45309;--amber-dim:#fffbeb;
  --red:#dc2626;--red-dim:#fef2f2;
  --teal:#0891b2;--teal-dim:#ecfeff;
  --bg:#f8fafc;--surface:#ffffff;--s2:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --f:'Inter',system-ui,sans-serif;
  --r:6px;--sh:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 16px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:var(--f);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;}
button{font-family:var(--f);cursor:pointer;border:none;background:none;}
input,textarea,select{font-family:var(--f);}
input[type=file]{display:none;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

.screen{display:none;height:100vh;overflow:hidden;}
.screen.active{display:flex;}

/* ── LOGIN ── */
#ls{align-items:center;justify-content:center;background:var(--navy);position:relative;overflow:hidden;}
#ls::before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(26,86,219,.18),transparent 65%);}
.l-wrap{position:relative;z-index:1;width:420px;}
.l-card{background:var(--surface);border-radius:12px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.4);}
.l-header{background:var(--navy);padding:28px 32px 24px;text-align:center;}
.l-brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px;}
.l-brand-icon{width:36px;height:36px;border-radius:9px;background:var(--blue);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(26,86,219,.4);}
.l-brand-icon svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;}
.l-brand-name{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.l-tagline{font-size:12px;color:rgba(255,255,255,.45);margin-top:2px;}
.l-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--s2);}
.l-tab{flex:1;padding:12px;font-size:13px;font-weight:600;color:var(--text3);transition:all .15s;border-bottom:2px solid transparent;cursor:pointer;}
.l-tab.on{color:var(--blue);border-color:var(--blue);background:var(--surface);}
.l-body{padding:24px 32px 28px;}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;letter-spacing:.2px;}
.fi{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--text);background:var(--surface);transition:border-color .15s;}
.fi:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1);}
.fi::placeholder{color:var(--text3);}
.l-btn{width:100%;padding:10px;border-radius:var(--r);background:var(--blue);color:#fff;font-size:13px;font-weight:700;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.l-btn:hover{background:var(--blue2);box-shadow:0 3px 12px rgba(26,86,219,.35);}
.l-btn.busy{opacity:.7;cursor:not-allowed;}
.l-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;}
.l-err{background:var(--red-dim);border:1px solid #fecaca;border-radius:var(--r);padding:8px 12px;font-size:12px;color:var(--red);margin-bottom:12px;}
.l-hint{text-align:center;margin-top:14px;font-size:11px;color:rgba(255,255,255,.3);}
.l-divider{display:flex;align-items:center;gap:10px;margin:18px 0;font-size:12px;color:var(--text3);}
.l-divider::before,.l-divider::after{content:"";flex:1;height:1px;background:var(--border);}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:10px 16px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);font-size:13px;font-weight:600;color:#3c4043;cursor:pointer;transition:all .15s;box-shadow:var(--sh);}
.google-btn:hover{background:var(--s2);}
.g-ic{width:18px;height:18px;flex-shrink:0;}
.l-back{text-align:center;margin-top:12px;font-size:12px;color:rgba(255,255,255,.4);}
.l-back a{color:#93c5fd;font-weight:600;}

/* ── APP LAYOUT ── */
#as{flex-direction:column;}
.app-layout{flex:1;display:grid;grid-template-columns:260px 1fr;overflow:hidden;}

/* ── TOPBAR ── */
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
.tb-brand{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px;}
.tb-brand-icon{width:30px;height:30px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px rgba(26,86,219,.35);}
.tb-brand-icon svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2;}
.tb-user{display:flex;align-items:center;gap:8px;margin-left:auto;}
.tb-plan{font-size:11px;font-weight:700;letter-spacing:.5px;padding:3px 9px;border-radius:20px;background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-mid);}
.tb-avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-dim);border:1px solid var(--blue-mid);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--blue);}
.tb-name{font-size:13px;font-weight:600;color:var(--text);}
.tb-logout{padding:5px 10px;border-radius:var(--r);border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;}
.tb-logout:hover{border-color:var(--red);color:var(--red);}
.tb-back-link{font-size:12px;font-weight:600;color:var(--blue);text-decoration:none;display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);border:1px solid var(--border);transition:all .15s;}
.tb-back-link:hover{background:var(--s2);}
.tb-back-link svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;}

/* ── SIDEBAR ── */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:0;}
.sb-sec{padding:14px 10px 6px;}
.sb-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);padding:0 8px;margin-bottom:4px;}
.nb{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:var(--r);font-size:13px;font-weight:500;color:var(--text2);transition:all .12s;width:100%;text-align:left;margin-bottom:1px;}
.nb:hover{background:var(--s2);color:var(--text);}
.nb.on{background:var(--blue-dim);color:var(--blue);font-weight:600;}
.nb svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;flex-shrink:0;}
.nb-badge{margin-left:auto;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--blue-dim);color:var(--blue);}
.sb-footer{margin-top:auto;padding:14px;border-top:1px solid var(--border);}
.sb-user{display:flex;align-items:center;gap:9px;}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-dim);border:1px solid var(--blue-mid);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--blue);flex-shrink:0;}
.sb-user-name{font-size:12px;font-weight:600;color:var(--text);}
.sb-user-role{font-size:11px;color:var(--text3);}
.sb-logout{padding:4px;border-radius:4px;color:var(--text3);cursor:pointer;transition:color .15s;flex-shrink:0;}
.sb-logout:hover{color:var(--red);}
.sb-logout svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;display:block;}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.page-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface);}
.page-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.2px;}
.ph-sp{flex:1;}
.act-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);font-size:12.5px;font-weight:600;transition:all .15s;}
.act-btn svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;}
.ab-p{background:var(--blue);color:#fff;}
.ab-p:hover{background:var(--blue2);}
.ab-g{border:1px solid var(--border);color:var(--text2);background:var(--surface);}
.ab-g:hover{border-color:var(--border2);color:var(--text);}
.page-content{flex:1;overflow-y:auto;padding:24px;}

/* ── ANALYSE VIEW ── */
.analyse-layout{display:grid;grid-template-columns:260px 1fr;flex:1;overflow:hidden;}
.an-sidebar{border-right:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;background:var(--surface);}
.an-sidebar::-webkit-scrollbar{width:0;}
.an-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.species-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.sp-btn{padding:8px 10px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;text-align:left;display:flex;align-items:center;gap:6px;}
.sp-btn:hover{border-color:var(--blue-mid);color:var(--blue);}
.sp-btn.on{border-color:var(--blue);background:var(--blue-dim);color:var(--blue);font-weight:600;}
.sp-dot{width:5px;height:5px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .12s;}
.sp-btn.on .sp-dot{background:var(--blue);}
.region-list{display:flex;flex-direction:column;gap:2px;}
.rg-btn{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--r);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;border:none;background:transparent;text-align:left;width:100%;}
.rg-btn:hover{background:var(--s2);color:var(--text);}
.rg-btn.on{background:var(--blue-dim);color:var(--blue);font-weight:600;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.mode-btn{padding:7px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;transition:all .12s;}
.mode-btn:hover{border-color:var(--border2);}
.mode-btn.on{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:700;}
.uz{border:1.5px dashed var(--border2);border-radius:var(--r);background:var(--s2);padding:10px;min-height:86px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.uz:hover,.uz.drag{border-color:var(--blue);background:var(--blue-dim);}
.uz.loaded{border-style:solid;border-color:var(--teal);background:var(--teal-dim);}
.uz-tag{position:absolute;top:5px;left:7px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);}
.uz-tag.lt{color:var(--teal);}
.uz svg{width:20px;height:20px;fill:none;stroke:var(--text3);stroke-width:1.5;}
.uz-text{font-size:11px;font-weight:500;color:var(--text3);}
.uz-preview{max-width:100%;max-height:78px;object-fit:contain;border-radius:4px;}
.uz-name{font-size:10px;color:var(--teal);text-align:center;word-break:break-all;font-weight:500;}
.uz-remove{position:absolute;top:4px;right:5px;background:var(--red-dim);border:1px solid #fecaca;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:600;color:var(--red);}
.ctx{width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--text);background:var(--surface);resize:vertical;min-height:62px;line-height:1.5;}
.ctx:focus{outline:none;border-color:var(--blue);}
.ctx::placeholder{color:var(--text3);}
.run-btn{width:100%;padding:10px;border-radius:var(--r);background:var(--blue);color:#fff;font-size:13px;font-weight:700;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;}
.run-btn:hover:not(:disabled){background:var(--blue2);box-shadow:0 4px 12px rgba(26,86,219,.35);}
.run-btn:disabled{opacity:.4;cursor:not-allowed;}
.run-btn.busy{opacity:.7;cursor:not-allowed;}
.run-spin{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;animation:spin .7s linear infinite;display:none;}
.run-btn.busy .run-spin{display:block;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESULT AREA ── */
.an-main{overflow-y:auto;padding:24px;background:var(--bg);}
.an-main::-webkit-scrollbar{width:5px;}
.an-main::-webkit-scrollbar-thumb{background:var(--border2);}
.empty-view{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;text-align:center;padding:40px;}
.empty-icon{width:48px;height:48px;border-radius:12px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;box-shadow:var(--sh);}
.empty-icon svg{width:22px;height:22px;fill:none;stroke:var(--text3);stroke-width:1.5;}
.empty-title{font-size:15px;font-weight:700;color:var(--text);}
.empty-desc{font-size:13px;color:var(--text2);max-width:340px;line-height:1.7;}
.empty-steps{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
.empty-step{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);font-size:12.5px;font-weight:500;color:var(--text2);text-align:left;}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--blue-dim);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.load-view{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0;}
.load-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:22px 28px;box-shadow:var(--sh2);width:340px;}
.load-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;}
.l-step{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text3);margin-bottom:7px;transition:color .3s;}
.l-step.done{color:var(--green);}
.l-step.active{color:var(--blue);}
.l-step-spin{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--blue-mid);border-top-color:var(--blue);animation:spin .7s linear infinite;flex-shrink:0;}
.l-bar{margin-top:14px;height:3px;background:var(--border);border-radius:3px;overflow:hidden;}
.l-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal));animation:ind 1.8s ease-in-out infinite;}
@keyframes ind{0%{width:0%;margin-left:0}50%{width:50%;margin-left:25%}100%{width:0%;margin-left:100%}}

/* RESULT */
.result-card{max-width:820px;margin:0 auto;}
.result-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;}
.result-bc{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:5px;letter-spacing:.2px;}
.result-h1{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.3px;}
.result-meta{font-size:11px;color:var(--text3);margin-top:4px;}
.result-btns{display:flex;gap:6px;flex-shrink:0;}
.img-strip{display:flex;gap:10px;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;box-shadow:var(--sh);}
.img-item{flex:1;display:flex;flex-direction:column;gap:4px;align-items:center;}
.img-item img{max-width:100%;max-height:160px;object-fit:contain;border-radius:4px;border:1px solid var(--border);}
.img-tag{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.sev-bar{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r);margin-bottom:16px;border:1px solid;}
.sev-low{background:var(--green-dim);border-color:#a7f3d0;}
.sev-mid{background:var(--amber-dim);border-color:#fde68a;}
.sev-high{background:var(--red-dim);border-color:#fecaca;}
.sev-label{font-size:12px;font-weight:800;letter-spacing:.3px;}
.sev-low .sev-label{color:var(--green);}
.sev-mid .sev-label{color:var(--amber);}
.sev-high .sev-label{color:var(--red);}
.sev-desc{font-size:11px;color:var(--text2);margin-top:1px;}
.sev-track{flex:1;height:4px;background:rgba(0,0,0,.07);border-radius:2px;}
.sev-fill{height:100%;border-radius:2px;}
.sev-low .sev-fill{background:var(--green);width:25%;}
.sev-mid .sev-fill{background:var(--amber);width:60%;}
.sev-high .sev-fill{background:var(--red);width:95%;}
.result-body{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:22px;box-shadow:var(--sh);margin-bottom:14px;}
.result-body h2{font-size:13px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:.7px;padding:10px 0 7px;border-bottom:1px solid var(--border);margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.result-body h2::before{content:"";display:inline-block;width:3px;height:12px;background:var(--blue);border-radius:2px;}
.result-body h3{font-size:13px;font-weight:700;color:var(--navy2);margin:12px 0 5px;}
.result-body p{font-size:13px;line-height:1.8;color:var(--text2);margin-bottom:7px;}
.result-body ul{padding-left:16px;margin-bottom:8px;}
.result-body li{font-size:13px;line-height:1.75;color:var(--text2);margin-bottom:2px;}
.result-body strong{color:var(--text);font-weight:700;}
.result-body hr{border:none;border-top:1px solid var(--border);margin:12px 0;}
.result-body table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0 12px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.result-body th{background:var(--navy);color:#e2e8f0;padding:7px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.result-body td{padding:7px 12px;border-bottom:1px solid var(--border);color:var(--text2);}
.result-body tr:last-child td{border-bottom:none;}
.disclaimer{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;font-size:11px;color:var(--text3);line-height:1.65;}
.report-list{display:flex;flex-direction:column;gap:10px;}
.report-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .12s;box-shadow:var(--sh);}
.report-item:hover{border-color:var(--border2);box-shadow:var(--sh2);}
.report-item-icon{width:38px;height:38px;border-radius:8px;background:var(--blue-dim);border:1px solid var(--blue-mid);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.report-item-icon svg{width:18px;height:18px;fill:none;stroke:var(--blue);stroke-width:2;}
.report-item-info{flex:1;min-width:0;}
.report-item-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
.report-item-meta{font-size:11px;color:var(--text3);}
.report-item-actions{display:flex;gap:6px;flex-shrink:0;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;}
.b-g{background:var(--green-dim);color:var(--green);}
.b-b{background:var(--blue-dim);color:var(--blue);}
.b-a{background:var(--amber-dim);color:var(--amber);}
.b-r{background:var(--red-dim);color:var(--red);}
.b-gray{background:var(--s2);color:var(--text3);border:1px solid var(--border);}
.kpi-g{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:15px 16px;}
.kpi-lbl{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.kpi-val{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1;}
.kpi-note{font-size:11px;color:var(--green);margin-top:4px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.h{display:none;}
.modal{background:var(--surface);border-radius:10px;box-shadow:0 24px 64px rgba(0,0,0,.2);width:100%;max-width:500px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.m-h{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.m-t{font-size:14px;font-weight:700;color:var(--text);}
.m-cl{padding:3px;color:var(--text3);cursor:pointer;border-radius:4px;}
.m-cl svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;display:block;}
.m-b{padding:18px 20px;overflow-y:auto;flex:1;}
.m-f{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;}
.m-btn{padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:700;transition:all .15s;}
.m-p{background:var(--blue);color:#fff;}
.m-p:hover{background:var(--blue2);}
.m-g{border:1px solid var(--border);color:var(--text2);background:var(--surface);}
.toast{position:fixed;bottom:18px;right:18px;z-index:2000;background:var(--navy2);color:#e2e8f0;border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:9px 14px;font-size:12.5px;font-weight:600;box-shadow:var(--sh2);display:flex;align-items:center;gap:7px;transform:translateY(50px);opacity:0;transition:all .32s cubic-bezier(.34,1.56,.64,1);}
.toast.show{transform:none;opacity:1;}
.t-dot{width:5px;height:5px;border-radius:50%;background:#4ade80;flex-shrink:0;}
</style>
</head>

<script>
// ── DATA ──
// Demo-Daten für Offline-Fallback entfernt — Authentifizierung läuft über /api/auth/login
const REPORTS=JSON.parse(localStorage.getItem('ps_reports')||'[]');
const saveReports=()=>localStorage.setItem('ps_reports',JSON.stringify(REPORTS));

// ── AUTH ──
let ME=null,loginRole='customer';
document.addEventListener('DOMContentLoaded',async ()=>{
  const h=document.getElementById('l-hint');
  if(h) h.textContent='Demo: dr.mueller\u0040tierklinik.de / demo123';
  // Auto-Login falls Token vorhanden
  const token=localStorage.getItem('ps_token');
  if(token){
    try{
      const res=await fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+token}});
      if(res.ok){const d=await res.json();ME=d.user;showApp();}
      else{localStorage.removeItem('ps_token');}
    }catch(e){}
  }
});
function setRole(role,btn){
  loginRole=role;
  document.querySelectorAll('.l-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const h=document.getElementById('l-hint');
  if(h) h.textContent=role==='admin'?'Admin: admin\u0040petscan.de / admin123':'Demo: dr.mueller\u0040tierklinik.de / demo123';
}
function doLogin(){
  const em=document.getElementById('l-em').value.trim();
  const pw=document.getElementById('l-pw').value;
  const err=document.getElementById('l-err');
  const btn=document.getElementById('l-btn');
  err.style.display='none';btn.classList.add('busy');
  setTimeout(()=>{
    const u=USERS.find(x=>x.email===em&&x.pw===pw);
    if(!u){err.style.display='block';err.textContent='Falsche E-Mail oder Passwort.';btn.classList.remove('busy');return;}
    if(loginRole==='admin'&&u.role!=='admin'){err.style.display='block';err.textContent='Kein Admin-Zugang.';btn.classList.remove('busy');return;}
    if(loginRole==='customer'&&u.role==='admin'){err.style.display='block';err.textContent='Bitte Admin-Tab verwenden.';btn.classList.remove('busy');return;}
    ME=u;btn.classList.remove('busy');
    if(u.role==='admin'){window.location.href='petscan-admin-v2.html';return;}
    showApp();
  },600);
}
function triggerGoogle(){
  toast('Google-Login: Client-ID hinterlegen → Weiterleitung …');
  ME=USERS[1];
  setTimeout(showApp,1400);
}
function doLogout(){
  const token=localStorage.getItem('ps_token');
  if(token) fetch('/api/auth/logout',{method:'POST',headers:{'Authorization':'Bearer '+token}});
  localStorage.removeItem('ps_token');
  ME=null;
  document.getElementById('as').classList.remove('active');
  document.getElementById('ls').classList.add('active');
  document.getElementById('l-pw').value='';
}

function showApp(){
  document.getElementById('ls').classList.remove('active');
  document.getElementById('as').classList.add('active');
  document.getElementById('tb-avatar').textContent=ME.name.charAt(0);
  document.getElementById('tb-name').textContent=ME.name;
  document.getElementById('tb-plan').textContent=ME.plan;
  document.getElementById('sb-avatar').textContent=ME.name.charAt(0);
  document.getElementById('sb-name').textContent=ME.name;
  document.getElementById('sb-praxis').textContent=ME.praxis;
  updateReportBadge();
  renderAnalyse();
}

// ── NAVIGATION ──
const AN={species:'Hund',region:'Thorax',mode:'single',imgA:null,imgB:null};
function navTo(view,btn){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  const titles={analyse:'Neue Analyse',reports:'Meine Befunde',account:'Mein Account'};
  document.getElementById('ph-t').textContent=titles[view]||view;
  document.getElementById('result-ts').textContent='';
  ({analyse:renderAnalyse,reports:renderReports,account:renderAccount}[view]||renderAnalyse)();
}
function updateReportBadge(){
  const myReports=REPORTS.filter(r=>r.userId===ME.id);
  document.getElementById('report-badge').textContent=myReports.length;
}

// ── ANALYSE VIEW ──
function renderAnalyse(){
  const c=document.getElementById('main-content');
  c.innerHTML=`<div class="analyse-layout" style="flex:1;overflow:hidden;display:grid">
    <div class="an-sidebar" id="an-sb">
      <div>
        <div class="an-lbl">Tierart</div>
        <div class="species-grid">
          ${['Hund','Katze','Pferd','Rind','Vogel','Sonstige'].map(s=>`<button class="sp-btn${AN.species===s?' on':''}" data-s="${s}" onclick="setSpecies(this)"><span class="sp-dot"></span>${s}</button>`).join('')}
        </div>
      </div>
      <div>
        <div class="an-lbl">Körperregion</div>
        <div class="region-list">
          ${[['Thorax / Lunge','Thorax'],['Abdomen','Abdomen'],['Extremitäten','Extremitäten'],['Wirbelsäule','Wirbelsäule'],['Schädel / Dentition','Schädel'],['Ganzkörper','Ganzkörper']].map(([l,v])=>`<button class="rg-btn${AN.region===v?' on':''}" data-r="${v}" onclick="setRegion(this)">${l}</button>`).join('')}
        </div>
      </div>
      <div>
        <div class="an-lbl">Analyse-Modus</div>
        <div class="mode-grid">
          ${[['Einzelbild','single'],['Verlauf','compare'],['Vergleich','diff'],['Zweitmeinung','second']].map(([l,v])=>`<button class="mode-btn${AN.mode===v?' on':''}" data-m="${v}" onclick="setMode(this)">${l}</button>`).join('')}
        </div>
      </div>
      <div>
        <div class="an-lbl">Bildmaterial hochladen</div>
        <div class="uz" id="uz-a" onclick="document.getElementById('fi-a').click()" style="margin-bottom:6px">
          <input type="file" id="fi-a" accept="image/*">
          <span class="uz-tag">AUFNAHME A</span>
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          <div class="uz-text">Klicken oder ziehen</div>
        </div>
        <div class="uz" id="uz-b" onclick="document.getElementById('fi-b').click()">
          <input type="file" id="fi-b" accept="image/*">
          <span class="uz-tag">AUFNAHME B <span style="opacity:.5">(opt.)</span></span>
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          <div class="uz-text">Vergleichsaufnahme</div>
        </div>
      </div>
      <div>
        <div class="an-lbl">Klinischer Kontext</div>
        <textarea class="ctx" id="ctx" placeholder="Anamnese, Symptome, Verdachtsdiagnose …"></textarea>
      </div>
      <button class="run-btn" id="run-btn" onclick="runAnalysis()">
        <div class="run-spin"></div>
        <span>Radiologische Analyse starten</span>
      </button>
    </div>
    <div class="an-main" id="an-main">
      <div class="empty-view">
        <div class="empty-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
        <div class="empty-title">Bereit für die Analyse</div>
        <div class="empty-desc">Tierart und Region wählen, Aufnahme hochladen und Analyse starten.</div>
        <div class="empty-steps">
          <div class="empty-step"><span class="step-num">1</span>Tierart &amp; Körperregion auswählen</div>
          <div class="empty-step"><span class="step-num">2</span>Röntgenaufnahme hochladen</div>
          <div class="empty-step"><span class="step-num">3</span>Analyse starten — Befund in &lt; 30 Sek.</div>
          <div class="empty-step"><span class="step-num">4</span>PDF exportieren &amp; archivieren</div>
        </div>
      </div>
    </div>
  </div>`;
  setupUploads();
}
function setSpecies(btn){document.querySelectorAll('.sp-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');AN.species=btn.dataset.s;}
function setRegion(btn){document.querySelectorAll('.rg-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');AN.region=btn.dataset.r;}
function setMode(btn){document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');AN.mode=btn.dataset.m;}

function setupUploads(){
  ['a','b'].forEach(k=>{
    const uz=document.getElementById('uz-'+k);
    const fi=document.getElementById('fi-'+k);
    if(!uz||!fi) return;
    fi.addEventListener('change',e=>{if(e.target.files[0])loadImg(e.target.files[0],k);});
    uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag');});
    uz.addEventListener('dragleave',()=>uz.classList.remove('drag'));
    uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('drag');if(e.dataTransfer.files[0])loadImg(e.dataTransfer.files[0],k);});
  });
}
function loadImg(file,k){
  if(!file.type.startsWith('image/')){toast('Nur Bilddateien');return;}
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;
      c.getContext('2d').drawImage(img,0,0);
      const url=c.toDataURL('image/jpeg',.9);
      if(k==='a') AN.imgA={url,b64:url.split(',')[1],name:file.name};
      else AN.imgB={url,b64:url.split(',')[1],name:file.name};
      const uz=document.getElementById('uz-'+k);
      uz.classList.add('loaded');uz.onclick=null;
      uz.innerHTML=`<span class="uz-tag lt">AUFNAHME ${k.toUpperCase()} — GELADEN</span><img class="uz-preview" src="${url}"><div class="uz-name">${file.name}</div><button class="uz-remove" onclick="removeImg('${k}',event)">Entfernen</button>`;
      toast('Aufnahme '+(k==='a'?'A':'B')+' geladen');
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}
function removeImg(k,e){
  e.stopPropagation();
  if(k==='a') AN.imgA=null; else AN.imgB=null;
  const uz=document.getElementById('uz-'+k);
  uz.classList.remove('loaded');
  uz.innerHTML=`<input type="file" id="fi-${k}" accept="image/*"><span class="uz-tag">AUFNAHME ${k.toUpperCase()}${k==='b'?' <span style="opacity:.5">(opt.)</span>':''}</span><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="var(--text3)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><div class="uz-text">${k==='a'?'Klicken oder ziehen':'Vergleichsaufnahme'}</div>`;
  uz.onclick=()=>document.getElementById('fi-'+k).click();
  setupUploads();
}

// ── ANALYSIS ──
async function runAnalysis(){
  if(!AN.imgA){toast('Bitte Aufnahme A hochladen');return;}
  if(AN.mode!=='single'&&!AN.imgB){toast('Bitte Aufnahme B für Vergleich hochladen');return;}
  const btn=document.getElementById('run-btn');
  btn.disabled=true;btn.classList.add('busy');
  showLoading();
  const modeText={
    single:`Erstelle einen vollständigen veterinärradiologischen Befundbericht für einen ${AN.species} im Bereich ${AN.region}.`,
    compare:`Vergleiche Aufnahme A (früher) mit Aufnahme B (aktuell) eines ${AN.species} im Bereich ${AN.region}.`,
    diff:`Identifiziere alle relevanten Unterschiede zwischen Aufnahme A und B beim ${AN.species}, Region ${AN.region}.`,
    second:`Erstelle eine fundierte Zweitmeinung zu den Aufnahmen eines ${AN.species} im Bereich ${AN.region}.`
  };
  const system=`Du bist ein erfahrener Veterinärradiologe. Erstelle professionelle deutschsprachige Befundberichte.
Struktur: ## Technische Beurteilung, ## Befund, ## Interpretation, ## Differenzialdiagnosen (Tabelle mit |), ## Empfehlungen, ## Dringlichkeit (NIEDRIG/MITTEL/HOCH).
Nutze ## h2, ### h3, **fett**, Tabellen. Schreibe präzise und klinisch. Haftungshinweis am Ende.`;
  const content=[];
  content.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:AN.imgA.b64}});
  content.push({type:'text',text:'Aufnahme A:'});
  if(AN.imgB&&AN.mode!=='single'){content.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:AN.imgB.b64}});content.push({type:'text',text:'Aufnahme B:'});}
  const ctx=document.getElementById('ctx')?.value.trim()||'';
  let prompt=modeText[AN.mode];
  if(ctx) prompt+=`\n\nKlinischer Kontext: ${ctx}`;
  content.push({type:'text',text:prompt});
  stepAnimate();
  try{
    const res=await fetch('/api/analyse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system,messages:[{role:'user',content}]})});
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    const text=data.report_text||'';
    const sev=detectSev(text);
    const report={id:'r'+Date.now(),userId:ME.id,species:AN.species,region:AN.region,mode:AN.mode,severity:sev,report_text:text,img_a:AN.imgA?.url||'',img_b:AN.imgB?.url||'',created_at:new Date().toISOString()};
    REPORTS.push(report);saveReports();updateReportBadge();
    renderResult(report);
    document.getElementById('result-ts').textContent='Befund erstellt: '+new Date().toLocaleTimeString('de-DE');
    toast('Befund gespeichert');
  }catch(e){document.getElementById('an-main').innerHTML=`<div class="empty-view"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div><div class="empty-title" style="color:var(--red)">Fehler</div><div class="empty-desc">${e.message}</div></div>`;}
  btn.disabled=false;btn.classList.remove('busy');
}
function showLoading(){
  document.getElementById('an-main').innerHTML=`<div class="load-view"><div class="load-card"><div class="load-title">Radiologische KI-Analyse</div><div class="l-step done" id="ls1"><div style="width:13px;height:13px;flex-shrink:0;display:flex;align-items:center"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg></div>Bildmaterial vorbereitet</div><div class="l-step active" id="ls2"><div class="l-step-spin"></div>Übertragung läuft …</div><div class="l-step" id="ls3"><div style="width:13px;height:13px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0"></div>KI-Analyse läuft</div><div class="l-step" id="ls4"><div style="width:13px;height:13px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0"></div>Befund wird erstellt</div><div class="l-bar"><div class="l-bar-fill"></div></div></div></div>`;
}
function stepAnimate(){
  setTimeout(()=>markStep('ls2','ls3','KI-Analyse läuft'),800);
  setTimeout(()=>markStep('ls3','ls4','Befund wird erstellt'),1800);
}
function markStep(d,n,lbl){
  const de=document.getElementById(d),ne=document.getElementById(n);
  if(de){de.classList.remove('active');de.classList.add('done');de.innerHTML=`<div style="width:13px;height:13px;flex-shrink:0;display:flex;align-items:center"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg></div>${de.textContent.trim()}`;}
  if(ne){ne.classList.add('active');ne.innerHTML=`<div class="l-step-spin"></div>${lbl}`;}
}
function renderResult(r){
  const modeLabel={single:'Einzelanalyse',compare:'Verlauf',diff:'Vergleich',second:'Zweitmeinung'}[r.mode]||r.mode;
  const si={low:{cls:'sev-low',label:'NIEDRIG',desc:'Routinebefund'},mid:{cls:'sev-mid',label:'MITTEL',desc:'Zeitnahe Abklärung empfohlen'},high:{cls:'sev-high',label:'HOCH',desc:'Sofortige Intervention erforderlich'}}[r.severity]||{cls:'sev-mid',label:'MITTEL',desc:''};
  const imgs=r.img_a?`<div class="img-strip"><div class="img-item"><img src="${r.img_a}"><div class="img-tag">AUFNAHME A</div></div>${r.img_b&&r.mode!=='single'?`<div class="img-item"><img src="${r.img_b}"><div class="img-tag">AUFNAHME B</div></div>`:''}</div>`:'';
  document.getElementById('an-main').innerHTML=`<div class="result-card"><div class="result-header"><div><div class="result-bc">${r.species} / ${r.region} / ${modeLabel}</div><div class="result-h1">Radiologischer Befundbericht</div><div class="result-meta">${fmtFull(r.created_at)} &middot; ID ${r.id}</div></div><div class="result-btns"><button class="act-btn ab-g" onclick="exportPDF('${r.id}')">PDF exportieren</button></div></div>${imgs}<div class="sev-bar ${si.cls}"><div style="flex:1"><div class="sev-label">DRINGLICHKEIT: ${si.label}</div><div class="sev-desc">${si.desc}</div></div><div class="sev-track"><div class="sev-fill"></div></div></div><div class="result-body">${mdToHtml(r.report_text)}</div><div class="disclaimer">Dieser Befundbericht wurde durch ein KI-Assistenzsystem erstellt und ersetzt keine veterinärmedizinische Diagnose oder Behandlungsentscheidung durch einen approbierten Tierarzt.</div></div>`;
}

// ── REPORTS VIEW ──
function renderReports(){
  const myR=REPORTS.filter(r=>r.userId===ME.id).sort((a,b)=>b.created_at.localeCompare(a.created_at));
  const c=document.getElementById('main-content');
  c.style.overflow='';
  c.innerHTML=`<div class="page-content">${!myR.length?`<div class="empty-view" style="height:300px"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div class="empty-title">Noch keine Befunde</div><div class="empty-desc">Starten Sie Ihre erste Analyse.</div></div>`:`<div class="report-list">${myR.map(r=>`<div class="report-item" onclick='openReport(${JSON.stringify(JSON.stringify(r))})'><div class="report-item-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div class="report-item-info"><div class="report-item-title">${r.species} &middot; ${r.region}</div><div class="report-item-meta">${fmtFull(r.created_at)} &middot; ${{single:'Einzelanalyse',compare:'Verlauf',diff:'Vergleich',second:'Zweitmeinung'}[r.mode]||r.mode}</div></div><span class="badge ${r.severity==='low'?'b-g':r.severity==='high'?'b-r':'b-a'}">${r.severity==='low'?'NIEDRIG':r.severity==='high'?'HOCH':'MITTEL'}</span><div class="report-item-actions" onclick="event.stopPropagation()"><button class="act-btn ab-g" onclick="exportPDF('${r.id}')">PDF</button><button class="act-btn" style="color:var(--red);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px;font-size:12px;font-weight:600;background:var(--surface)" onclick="deleteReport('${r.id}',event)">Löschen</button></div></div>`).join('')}</div>`}</div>`;
}
function openReport(rJson){const r=JSON.parse(rJson);navTo('analyse',document.querySelector('[data-v=analyse]'));setTimeout(()=>renderResult(r),60);}
function deleteReport(id,e){e.stopPropagation();if(!confirm('Befund löschen?'))return;const i=REPORTS.findIndex(r=>r.id===id);if(i>-1){REPORTS.splice(i,1);saveReports();}updateReportBadge();renderReports();toast('Befund gelöscht');}

// ── ACCOUNT ──
function renderAccount(){
  const c=document.getElementById('main-content');
  c.style.overflow='';
  const myR=REPORTS.filter(r=>r.userId===ME.id);
  c.innerHTML=`<div class="page-content"><div style="max-width:600px"><div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:14px;box-shadow:var(--sh)"><div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)">Profil</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px"><div><div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px">Name</div><input style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--text);background:var(--s2);font-family:var(--f)" value="${ME.name}" readonly></div><div><div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px">Praxis</div><input style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--text);background:var(--s2);font-family:var(--f)" value="${ME.praxis}" readonly></div></div><div><div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px">E-Mail</div><input style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--text);background:var(--s2);font-family:var(--f)" value="${ME.email}" readonly></div></div><div class="kpi-g"><div class="kpi"><div class="kpi-lbl">Plan</div><div class="kpi-val" style="font-size:20px">${ME.plan}</div><div class="kpi-note">Aktiv</div></div><div class="kpi"><div class="kpi-lbl">Befunde</div><div class="kpi-val">${myR.length}</div><div class="kpi-note">Gespeichert</div></div><div class="kpi"><div class="kpi-lbl">Analysen</div><div class="kpi-val">${myR.length}</div><div class="kpi-note">Diesen Monat</div></div></div></div></div>`;
}

// ── PDF EXPORT ──
function exportPDF(id){
  const r=REPORTS.find(r=>r.id===id);
  if(!r){toast('Befund nicht gefunden');return;}
  const modeLabel={single:'Einzelanalyse',compare:'Verlaufsanalyse',diff:'Vergleich',second:'Zweitmeinung'}[r.mode]||r.mode;
  const sevColor=r.severity==='low'?'#059669':r.severity==='high'?'#dc2626':'#b45309';
  const sevLabel=r.severity==='low'?'NIEDRIG – Routinebefund':r.severity==='high'?'HOCH – Sofortige Intervention':'MITTEL – Zeitnahe Abklärung';
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><title>Petscan Befund</title><link href="${'https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap'}" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',sans-serif;color:#0f172a;font-size:13px;line-height:1.6;background:#fff;padding:40px;-webkit-font-smoothing:antialiased;}.header{border-bottom:2px solid #0f1c35;padding-bottom:20px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:flex-start;}.brand{font-size:20px;font-weight:800;color:#0f1c35;letter-spacing:-.3px;}.brand-sub{font-size:11px;color:#64748b;margin-top:2px;font-weight:500;}.report-title{font-size:20px;font-weight:800;color:#0f172a;margin-bottom:4px;letter-spacing:-.3px;}.meta{font-size:11px;color:#64748b;font-weight:500;}.sev{padding:10px 14px;border-radius:6px;margin:18px 0;background:${r.severity==='low'?'#ecfdf5':r.severity==='high'?'#fef2f2':'#fffbeb'};border:1px solid ${r.severity==='low'?'#a7f3d0':r.severity==='high'?'#fecaca':'#fde68a'};}.sev-label{font-size:12px;font-weight:800;color:${sevColor};letter-spacing:.3px;}.imgs{display:flex;gap:12px;margin:16px 0;}.imgs img{flex:1;max-height:200px;object-fit:contain;border:1px solid #e2e8f0;border-radius:4px;}h2{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#0f172a;padding:10px 0 6px;border-bottom:1px solid #e2e8f0;margin:16px 0 8px;}h3{font-size:13px;font-weight:700;color:#1a2e52;margin:12px 0 4px;}p{font-size:13px;color:#475569;margin-bottom:6px;}ul{padding-left:16px;margin-bottom:8px;}li{font-size:13px;color:#475569;margin-bottom:2px;}strong{color:#0f172a;font-weight:700;}table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0 12px;border:1px solid #e2e8f0;}th{background:#0f1c35;color:#e2e8f0;padding:6px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}td{padding:6px 10px;border-bottom:1px solid #e2e8f0;color:#475569;}tr:last-child td{border-bottom:none;}.disclaimer{margin-top:24px;padding:10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px;font-size:11px;color:#94a3b8;}.footer{margin-top:32px;padding-top:12px;border-top:1px solid #e2e8f0;font-size:11px;color:#94a3b8;display:flex;justify-content:space-between;}@media print{body{padding:20px;}@page{margin:1.5cm;size:A4;}}</style></head><body><div class="header"><div><div class="brand">Petscan</div><div class="brand-sub">Veterinärradiologie &middot; KI-Plattform</div></div><div style="text-align:right"><div style="font-size:12px;font-weight:700">${ME?.praxis||''}</div><div class="meta">${ME?.name||''}</div></div></div><div class="report-title">Radiologischer Befundbericht</div><div class="meta">${r.species} &middot; ${r.region} &middot; ${modeLabel} &middot; ${fmtFull(r.created_at)} &middot; ID ${r.id}</div><div class="sev"><div class="sev-label">DRINGLICHKEIT: ${sevLabel}</div></div>${r.img_a?`<div class="imgs"><img src="${r.img_a}">${r.img_b&&r.mode!=='single'?`<img src="${r.img_b}">`:''}</div>`:''}<div>${mdToPrint(r.report_text)}</div><div class="disclaimer">Dieser Befundbericht wurde durch ein KI-Assistenzsystem erstellt und ersetzt keine veterinärmedizinische Diagnose oder Behandlungsentscheidung durch einen approbierten Tierarzt. Petscan GmbH übernimmt keine Haftung für klinische Entscheidungen auf Basis dieses Berichts.</div><div class="footer"><span>Petscan &middot; petscan.de</span><span>Erstellt ${fmtFull(r.created_at)}</span></div><script>window.onload=()=>setTimeout(()=>window.print(),400);<\/script></body></html>`);
  win.document.close();toast('PDF wird geöffnet …');
}

// ── UTILS ──
function detectSev(t){const l=t.toLowerCase();if(l.includes('hoch')&&!l.includes('nicht hoch'))return 'high';if(l.includes('niedrig'))return 'low';return 'mid';}
function fmtFull(d){try{return new Date(d).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}catch{return d||'–';}}
function mdToHtml(md){
  if(!md) return '';
  let h=md.replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/^---$/gm,'<hr>');
  h=h.replace(/(\|.+\|\n?)+/g,t=>{const rows=t.trim().split('\n');let o='<table>';rows.forEach((row,i)=>{const cells=row.split('|').filter(c=>c.trim()).map(c=>c.trim());if(cells.every(c=>/^[-: ]+$/.test(c)))return;const tag=i===0?'th':'td';o+='<tr>'+cells.map(c=>`<${tag}>${c}</${tag}>`).join('')+'</tr>';});return o+'</table>';});
  h=h.replace(/(^- .+$\n?)+/gm,b=>`<ul>${b.trim().split('\n').map(l=>`<li>${l.replace(/^- /,'')}</li>`).join('')}</ul>`);
  h=h.split('\n\n').map(b=>(!b.trim()||b.match(/^<[htu]/))?b:`<p>${b.replace(/\n/g,' ')}</p>`).join('\n');
  return h;
}
function mdToPrint(md){return mdToHtml(md);}
function openModal(title,body,footer){document.getElementById('m-t').textContent=title;document.getElementById('m-b').innerHTML=body;document.getElementById('m-f').innerHTML=footer;document.getElementById('m-ov').classList.remove('h');}
function cModal(){document.getElementById('m-ov').classList.add('h');}
function toast(msg){document.getElementById('t-txt').textContent=msg;const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
</script>
